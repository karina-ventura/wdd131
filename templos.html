<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Álbum com imagens de Templos de diversos países responsivo para navegação adaptável.">
    <meta name="author" content="Karina Ventura">

    <title>Álbum do Templo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="estilos/templos.css">
    <link rel="stylesheet" href="estilos/templos-grande.css">
    

    <script src="scripts/templos.js" defer></script>

    
</head>

<body>

    <header>
        <h1>Álbum do Templo</h1>

        <button id="menu" aria-label="Menu">☰</button>

        <nav class="navigation">
            <a href="#">Página Inicial</a>
            <a href="#">Antigo</a>
            <a href="#">Novo</a>
            <a href="#">Grande</a>
            <a href="#">Pequeno</a>
        </nav>
    </header>

    <main>
        <h2>Página Inicial</h2>

        <div class="galeria">

            <figure>
                <img src="imagens/templo-sao-paulo.jpg" alt="Templo São Paulo">
                <figcaption>São Paulo</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-tailandia.jpg" alt="Templo Tailândia">
                <figcaption>Tailândia</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-paris.jpg" alt="Templo Paris">
                <figcaption>Paris</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-nigeria.jpg" alt="Templo Nigéria">
                <figcaption>Nigéria</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-natal.jpg" alt="Templo Natal">
                <figcaption>Natal</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-japao.jpg" alt="Templo Japão">
                <figcaption>Japão</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-gana.jpg" alt="Templo Gana">
                <figcaption>Gana</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-chile.jpg" alt="Templo Chile">
                <figcaption>Chile</figcaption>
            </figure>

            <figure>
                <img src="imagens/templo-africa.jpg" alt="Templo África do Sul">
                <figcaption>África do Sul</figcaption>
            </figure>

        </div>
    </main>

    <footer>

            <p>
                &copy;
                <span id="anoAtual"></span>
                Karina Ventura | Brasil
            </p>

            <p id="ultimaModificacao"></p>

</html>
